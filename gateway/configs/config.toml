
[analytics]
enabled = true
# Deprecated: allow_payloads is preserved for backward compatibility. When true
# and when send_request_body/send_response_body are not explicitly set, both
# request and response bodies will be included in analytics events.
# allow_payloads = true
# Capture request/response payloads (bodies) into the events.
send_request_body = true
send_response_body = true
# Truncate each captured body to this many bytes (0 = no limit).
max_payload_size = 2048
# Capture ALL request/response headers (redacted on output by masked_headers below).
send_request_headers = true
send_response_headers = true
# Suppress analytics/log output entirely for requests whose path starts with any
# of these prefixes (e.g. health probes).
ignored_path_prefixes = ["/health", "/ready"]
# "log" writes each analytics event to stdout as JSON (no external service needed).
# Use ["moesif", "log"] to do both.
enabled_publishers = ["log"]

[analytics.publishers.log]
# Header names (case-insensitive) whose values are redacted as "****".
masked_headers = ["authorization"]

# [analytics.publishers.moesif]
# application_id = "<MOESIF_APPLICATION_ID>"

[router]
gateway_host = "*"

[router.access_logs]
enabled = true

[controller.server]
gateway_id = "platform-gateway-id"

[policy_engine.logging]
level = "info"

[controller.logging]
level = "info"

[controller.controlplane]
insecure_skip_verify = true
gateway_name = "default"
apim_oauth2_client_id = "your-client-id"
apim_oauth2_client_secret = "your-client-secret"
# Option 2: Resource Owner Password Credentials Flow (OAuth2)
# apim_oauth2_username = "your-username"
# apim_oauth2_password = "your-password"

[controller.auth.basic]
enabled = true

[[controller.auth.basic.users]]
username = "admin"
password = "admin"
roles = ["admin"]

[policy_configurations.llm_cost_v1]
pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"

[immutable_gateway]
enabled = false
artifacts_dir = "/etc/api-platform-gateway/immutable_gateway/artifacts"

[policy_configurations.backendjwt_v1]
algorithm = "SHA256withRSA"
# algorithm = "NONE"
# algorithm = "ES256"
issuer = "https://gateway.local"
tokenexpiry = "15m"
tokencaching = true
cachemaxsize = 1000    

